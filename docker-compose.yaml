services:
  # ── Databases ──────────────────────────────────────────────────────
  pgvector:
    image: pgvector/pgvector:pg17
    container_name: pgvector
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # pgAdmin (pgvector 관리 UI) — http://localhost:5050
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      pgvector:
        condition: service_healthy

  redis:
    image: redis:7.4-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  graph_db:
    image: neo4j:5.18-community
    container_name: graph_db
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # korean-law-mcp (법령/판례 MCP 서버 — Streamable HTTP)
  korean_law_mcp:
    image: node:20-alpine
    container_name: korean_law_mcp
    working_dir: /app
    command: >
      sh -c "npm install -g korean-law-mcp &&
             korean-law-mcp --mode http --port 3100"
    ports:
      - "3100:3100"
    environment:
      LAW_OC: ${LAW_API_KEY}
      CORS_ORIGIN: ${KOREAN_LAW_MCP_CORS_ORIGIN:-http://localhost:8000}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3100/health 2>/dev/null; test $$? -ne 7"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── Application ────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fastapi_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/__pycache__
      - ${HF_CACHE_DIR:-./hf_cache}:/hf_cache
    env_file:
      - ./backend/.env
    environment:
      OLLAMA_HOST: http://host.docker.internal:11434
      HF_HOME: /hf_cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      pgvector:
        condition: service_healthy
      redis:
        condition: service_healthy
      graph_db:
        condition: service_healthy
      korean_law_mcp:
        condition: service_healthy

  # ── Auth (인증 전용, backend와 같은 빌드·코드마운트, command만 다름) ──
  # 발급(개인키)은 이 컨테이너에만. cloudflared가 http://auth:9000 으로 라우팅.
  # ⚠️ ports 없음 — 외부 진입은 cloudflared 터널만.
  auth:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: auth
    restart: unless-stopped
    command: uvicorn auth_main:app --host 0.0.0.0 --port 9000
    volumes:
      - ./backend:/app
      - /app/__pycache__
    env_file:
      - ./backend/.env        # 공유: DB·Redis·OAuth client secrets
      - ./backend/.env.auth   # auth 전용: JWT_PRIVATE_KEY_B64·JWT_PUBLIC_KEY_B64·JWT_KID·SERVICE_AUD
    depends_on:
      pgvector:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nextjs_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/.next
      - /app/node_modules
    env_file:
      - ./frontend/.env.local
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend

  # ── Workflow ───────────────────────────────────────────────────────
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n

  # ── Tunnel ─────────────────────────────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      - backend
      - auth
      - frontend
      - n8n

volumes:
  pgvector_data:
  pgadmin_data:
  redis_data:
  neo4j_data:
  neo4j_logs:
  n8n_data:
    external: true
